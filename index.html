            align-items: center;

            margin: 0;
        }

        /* O Balão com Identidade 3D Ilha */

            background: var(--white);
            max-width: 480px;

            border: 1px solid rgba(52, 152, 219, 0.2);
            text-align: center;
            position: relative;
        }

            font-size: 2.2em;
            margin: 0;
            letter-spacing: -1px;
