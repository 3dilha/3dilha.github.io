<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Ilha | Impressão 3D em Florianópolis</title>
    <style>
        :root {
            --primary-color: #25d366; /* Verde WhatsApp */
            --secondary-color: #833ab4; /* Roxo Instagram */
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .logo {
            width: 150px;
            height: 150px;
            background: #333; /* Espaço para sua logo */
            border-radius: 50%;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #444;
        }

        h1 { margin-bottom: 10px; }
        p { margin-bottom: 30px; color: #ccc; }

        .links-container {
            width: 100%;
            max-width: 400px;
        }

        .link-card {
            display: block;
            padding: 15px;
            margin-bottom: 15px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            transition: transform 0.2s;
        }

        .link-card:hover {
            transform: scale(1.03);
        }

        .whatsapp { background-color: var(--primary-color); }
        .instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        
        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="logo">
        <span>3D ILHA</span>
    </div>

    <h1>3D Ilha</h1>
    <p>Soluções em Impressão 3D em Florianópolis</p>

    <div class="links-container">
        <a href="https://wa.me/5548999999999" class="link-card whatsapp" target="_blank">
            Fale conosco no WhatsApp
        </a>

        <a href="https://instagram.com/3dilha" class="link-card instagram" target="_blank">
            Siga-nos no Instagram
        </a>
    </div>

    <footer>
        &copy; 2026 3D Ilha - 3dilha.com.br
    </footer>

</body>
</html>
